name: Publish GitHub Package Mirror

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-github-package-mirror-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-github-package-mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@edithatogo'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Prepare GitHub Packages manifest
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));

          pkg.name = '@edithatogo/nz-legislation-tool';
          pkg.publishConfig = {
            registry: 'https://npm.pkg.github.com'
          };

          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          EOF

      - name: Publish mirror package to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
